<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>第八課 籃球比賽 ‧ 生字動畫教學</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;700&family=Gochi+Hand&display=swap" rel="stylesheet">
<style>
  :root{
    --wall:#e7e3d9; --board:#fcfcf9; --ink:#25303b; --ink-soft:#5c6770;
    --red:#d44637; --blue:#2f6fb0; --green:#2f9e6f; --amber:rgba(255,210,64,.55);
    --kai:"DFKai-SB","BiauKai","標楷體","Kaiti TC","KaiTi","STKaiti","Noto Serif TC",serif;
    --hand:"Caveat","Gochi Hand",cursive; --dock:158px;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html{-webkit-text-size-adjust:100%}
  body{font-family:var(--kai);color:var(--ink);background:radial-gradient(135% 100% at 50% 0%, #f1eee7, var(--wall));
    min-height:100vh;min-height:100dvh;-webkit-user-select:none;user-select:none;overscroll-behavior-y:contain}
  .app{display:flex;flex-direction:column;min-height:100vh;min-height:100dvh}
  .bar{position:sticky;top:0;z-index:30;background:rgba(252,252,249,.96);backdrop-filter:blur(7px);
    border-bottom:1px solid #e4e0d6;padding:9px 13px 7px;box-shadow:0 4px 12px -10px rgba(0,0,0,.4)}
  .hd-row{display:flex;align-items:center;justify-content:space-between;gap:10px}
  .ttl{font-size:clamp(15px,4.4vw,21px);letter-spacing:1px;font-weight:bold}
  .ttl span{color:var(--red);margin:0 4px}
  .pcount{font-family:var(--hand);font-size:18px;color:var(--ink-soft);white-space:nowrap}
  .pcount b{color:var(--red);font-size:23px}
  .pbar{height:6px;border-radius:99px;background:#ece9e1;overflow:hidden;margin-top:7px}
  .pbar i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--blue),var(--green));border-radius:99px;animation:fillbar var(--scene,14s) linear forwards}
  @keyframes fillbar{to{width:100%}}
  .chips{display:flex;gap:6px;overflow-x:auto;padding:9px 1px 1px;scrollbar-width:none;-webkit-overflow-scrolling:touch}
  .chips::-webkit-scrollbar{display:none}
  .chips button{flex:0 0 auto;font-family:var(--kai);font-size:19px;width:38px;height:38px;border-radius:9px;border:1.5px solid #d9d5ca;background:#fff;color:var(--ink-soft)}
  .chips button.active{background:var(--ink);color:#fff;border-color:var(--ink)}
  .scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px 12px calc(var(--dock) + 16px + env(safe-area-inset-bottom))}
  .quizTip{position:sticky;top:0;z-index:20;display:none;margin:-12px -12px 12px;padding:9px 14px;background:var(--green);color:#fff;font-size:16px;text-align:center;letter-spacing:1px;box-shadow:0 4px 10px -6px rgba(0,0,0,.4)}
  .quizTip.show{display:block}
  .stage{display:flex;flex-direction:column;gap:12px}
  @media(min-width:760px){.stage{display:grid;grid-template-columns:350px 1fr;gap:16px;align-items:start;max-width:920px;margin:0 auto}}
  .write-col{display:flex;flex-direction:column;align-items:center;gap:11px;background:#fff;border:1.5px solid #ece8dd;border-radius:18px;padding:15px}
  .reading{text-align:center}
  .reading .zh{font-size:clamp(26px,7.4vw,32px);letter-spacing:6px}
  .reading .py{font-family:var(--hand);font-size:clamp(24px,6.8vw,30px);color:var(--red);margin-left:4px}
  .reading .peek{display:none;font-family:var(--hand);font-size:14px;color:var(--ink-soft);margin-top:3px}
  .reading.masked .zh,.reading.masked .py{filter:blur(8px)}
  .reading.masked .peek{display:block}.reading.masked{cursor:pointer}
  .gridbox{position:relative;width:min(76vw,330px);aspect-ratio:1;background:#fff;border:2px solid var(--ink);border-radius:9px;touch-action:none;-webkit-touch-callout:none;overflow:visible;box-shadow:0 9px 22px -15px rgba(0,0,0,.45)}
  .gridbox::before{content:"";position:absolute;left:0;right:0;top:50%;height:1px;transform:translateY(-.5px);background:repeating-linear-gradient(90deg,var(--red) 0 6px,transparent 6px 12px);opacity:.5}
  .gridbox::after{content:"";position:absolute;top:0;bottom:0;left:50%;width:1px;transform:translateX(-.5px);background:repeating-linear-gradient(0deg,var(--red) 0 6px,transparent 6px 12px);opacity:.5}
  .gridbox .diag{position:absolute;inset:0;pointer-events:none;opacity:.32}
  .gridbox .diag span{position:absolute;top:0;left:50%;width:1px;height:141.4%;transform-origin:top center;background:repeating-linear-gradient(0deg,#c9c4b8 0 6px,transparent 6px 12px)}
  .gridbox .diag span:nth-child(1){transform:rotate(45deg)}.gridbox .diag span:nth-child(2){transform:rotate(-45deg)}
  #hzwTarget{position:absolute;inset:0}
  #hzwTarget canvas{width:100%;height:100%;display:block}
  .hand{position:absolute;left:-999px;top:-999px;width:clamp(56px,22%,90px);aspect-ratio:1;pointer-events:none;z-index:6;opacity:0;transition:opacity .18s;filter:drop-shadow(0 6px 5px rgba(0,0,0,.2))}
  .hand.show{opacity:1}
  .hand svg{width:100%;height:100%;transform-origin:6% 6%;animation:penwob 1.5s ease-in-out infinite}
  @keyframes penwob{0%,100%{transform:rotate(-2.5deg)}50%{transform:rotate(2.5deg)}}
  .stage.paused .hand svg{animation-play-state:paused}
  .meta{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
  .meta .pill{font-size:14px;background:#f7f5ef;border:1.5px solid #e1ddd2;border-radius:99px;padding:5px 13px;color:var(--ink-soft)}
  .meta .pill b{color:var(--ink)}
  .content-col{display:flex;flex-direction:column;gap:12px}
  .panel{background:#fff;border:1.5px solid #ece8dd;border-radius:18px;padding:13px 15px}
  .panel h3{font-size:15px;color:var(--blue);letter-spacing:1px;margin-bottom:10px}
  .panel h3 .tag{font-family:var(--hand);font-size:13px;color:var(--ink-soft);margin-left:6px}
  .web{display:grid;grid-template-columns:1fr auto 1fr;grid-template-rows:auto auto auto;gap:8px 10px;align-items:center;justify-items:center;min-height:148px}
  .web .center{grid-column:2;grid-row:2;width:54px;height:54px;display:flex;align-items:center;justify-content:center;font-size:32px;background:var(--ink);color:#fff;border-radius:10px}
  .web .w{font-size:21px;letter-spacing:2px;padding:7px 13px;border-radius:9px;background:#f7f5ef;border:1.5px solid #e3dfd4;white-space:nowrap}
  .web .w em{font-style:normal;color:var(--red)}
  .web .top{grid-column:2;grid-row:1}.web .bottom{grid-column:2;grid-row:3}.web .left{grid-column:1;grid-row:2}.web .right{grid-column:3;grid-row:2}
  .vocab{display:grid;grid-template-columns:1fr;gap:1px}
  @media(min-width:430px){.vocab{grid-template-columns:1fr 1fr;gap:3px 16px}}
  .vrow{display:flex;align-items:baseline;gap:8px;padding:7px 0;border-bottom:1px dashed #ece7db}
  .vrow .vw{font-size:18px;min-width:68px}
  .vrow .vp{font-family:var(--hand);font-size:16px;color:var(--blue);min-width:70px}
  .vrow .ve{font-size:12px;color:var(--ink-soft)}
  .cards{display:grid;grid-template-columns:1fr;gap:10px}
  @media(min-width:430px){.cards{grid-template-columns:1fr 1fr}}
  .card{border-radius:13px;padding:11px 13px;border:1.5px solid}
  .card.sim{background:#eef5fb;border-color:#cfe0ef}.card.hom{background:#fdeef0;border-color:#f3d2d7}
  .card .ct{font-family:var(--hand);font-size:13px;margin-bottom:3px}
  .card.sim .ct{color:var(--blue)}.card.hom .ct{color:var(--red)}
  .card .cc{font-size:20px}.card .cc b{color:var(--ink)}
  .card .cd{font-size:12.5px;color:var(--ink-soft);margin-top:2px;line-height:1.55}
  .idiom{position:relative;border:2.5px solid var(--red);border-radius:15px;padding:13px 14px;background:#fff;text-align:center}
  .idiom .ci{font-size:clamp(28px,8.4vw,40px);letter-spacing:8px;position:relative;display:inline-block}
  .idiom .ci::after{content:"";position:absolute;left:-4px;right:-4px;bottom:6px;height:40%;background:var(--amber);z-index:-1;border-radius:3px}
  .idiom .cm{font-size:14px;color:var(--ink-soft);margin-top:7px}
  .say{cursor:pointer;transition:transform .12s}.say:active{transform:scale(.96)}
  .say.pop{animation:pop .42s ease}
  @keyframes pop{0%{transform:scale(1)}38%{transform:scale(1.16)}100%{transform:scale(1)}}
  .reveal{animation:rise .55s cubic-bezier(.2,.7,.3,1) var(--d,0s) both}
  @keyframes rise{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
  .stage.paused .reveal{animation-play-state:paused}
  .gridbox.celebrate{animation:cel .85s ease}
  @keyframes cel{0%,100%{box-shadow:0 9px 22px -15px rgba(0,0,0,.45)}30%{box-shadow:0 0 0 6px rgba(47,158,111,.55)}}
  .dock{position:fixed;left:0;right:0;bottom:0;z-index:40;background:rgba(252,252,249,.97);backdrop-filter:blur(9px);border-top:1px solid #e4e0d6;box-shadow:0 -6px 18px -12px rgba(0,0,0,.4);padding:8px 10px calc(8px + env(safe-area-inset-bottom));display:flex;flex-direction:column;gap:7px}
  .dock .row1,.dock .row2{display:flex;gap:7px;align-items:center;justify-content:center;flex-wrap:wrap}
  .dock button{font-family:var(--kai);font-size:15px;border-radius:12px;border:1.5px solid #d4d0c5;background:#fff;color:var(--ink);min-height:46px;padding:0 14px;display:flex;align-items:center;justify-content:center;gap:5px;cursor:pointer}
  .dock button:active{transform:scale(.97)}
  .dock .ic{min-width:50px;font-size:19px}
  .dock .play{background:var(--red);color:#fff;border-color:var(--red);font-size:17px;padding:0 20px;flex:1;max-width:190px}
  .dock .toggle.on{background:var(--green);color:#fff;border-color:var(--green)}
  .dock .quiz{background:var(--green);color:#fff;border-color:var(--green)}
  .dock .quiz.active{background:var(--red);border-color:var(--red)}
  .speed{display:flex;align-items:center;gap:7px;font-size:14px;color:var(--ink-soft);min-height:46px;padding:0 6px}
  .speed input[type=range]{accent-color:var(--blue);width:88px}
</style>
</head>
<body>
<div class="app">
  <header class="bar">
    <div class="hd-row">
      <div class="ttl">第八課<span>·</span>籃球比賽 🏀</div>
      <div class="pcount"><b id="curNo">1</b>/<span id="totNo">10</span></div>
    </div>
    <div class="pbar"><i id="pbarFill"></i></div>
    <div class="chips" id="chips"></div>
  </header>
  <main class="scroll">
    <div class="quizTip" id="quizTip"></div>
    <div class="stage" id="stage"></div>
  </main>
  <nav class="dock">
    <div class="row1">
      <button id="prevBtn" class="ic">⟵</button>
      <button class="play" id="playBtn">▶ 播放</button>
      <button id="nextBtn" class="ic">⟶</button>
      <button class="toggle" id="autoBtn">連播 關</button>
    </div>
    <div class="row2">
      <button class="quiz" id="quizBtn">✍ 換我描寫</button>
      <button id="replayBtn2">↻ 重寫</button>
      <span class="speed">筆速<input type="range" id="speedRange" min="0.6" max="2" step="0.1" value="1"></span>
    </div>
  </nav>
</div>

<!-- bundled Hanzi Writer -->

/* ---- speech (zh-TW) for click-to-hear ---- */
let zhVoice = null;
function pickVoice(){
  if(!('speechSynthesis' in window)) return;
  const vs = speechSynthesis.getVoices()||[];
  // Mandarin voices only (drop Cantonese / dialects which would mispronounce everything)
  const zh = vs.filter(v=>/^(zh|cmn)/i.test(v.lang) && !/(yue|hk|hong|wuu|min|nan|hak|hsn|cantonese)/i.test((v.lang+' '+v.name)));
  const score = v=>{
    let s=0;
    if(/zh[-_]?(tw|hant)/i.test(v.lang)) s+=10;       // prefer Taiwan Mandarin (matches Traditional + 注音)
    else if(/zh[-_]?(cn|hans|sg)/i.test(v.lang)) s+=6;// then other Mandarin
    else if(/^(zh|cmn)/i.test(v.lang)) s+=4;
    if(/(siri|premium|enhanced|natural|neural|expressive)/i.test(v.name)) s+=5; // higher-quality engines read idioms better
    if(/(mei[-\s]?jia|美佳|ya[-\s]?tin| training|ting[-\s]?ting|婷婷|yu[-\s]?shu|li[-\s]?mu)/i.test(v.name)) s+=3;
    if(v.localService) s+=1;
    return s;
  };
  zh.sort((a,b)=>score(b)-score(a));
  zhVoice = zh[0] || vs.find(v=>/^(zh|cmn)/i.test(v.lang)) || null;
}
if('speechSynthesis' in window){ pickVoice(); speechSynthesis.onvoiceschanged = pickVoice; }
/* pronunciation overrides: force correct tone where the system voice guesses wrong.
   當 here is 1st tone (dāng); 噹 is read only as dāng, so it speaks the right tone while the screen still shows 當. */
const SAY_FIX = { "當":"噹", "當機立斷":"噹機立斷" };
function speak(t){
  if(!('speechSynthesis' in window) || !t) return;
  t = SAY_FIX[t] || t;
  try{ speechSynthesis.cancel(); const u=new SpeechSynthesisUtterance(t); u.lang='zh-TW'; if(zhVoice)u.voice=zhVoice; u.rate=.85; speechSynthesis.speak(u);}catch(e){}
}

});
function markChip(){ [...chipsEl.children].forEach((c,i)=>c.classList.toggle('active',i===idx)); }

/* compute scene length from content amount */
function computeSceneMs(d){
  const vocabEnd = 3.6 + d.vocab.length*0.42;   // last vocab reveal
  return Math.round((Math.max(vocabEnd+2.2, 9) + 4.0) * 1000); // +idiom +hold
}

/* render one character scene */
function renderScene(d){
  const py = `<span class="zh">${d.zhuyin}</span>　<span class="py">${d.pinyin}</span>`;
  const web = (()=>{
    const slots={top:'',bottom:'',left:'',right:''};
    const pos=['top','right','bottom','left'];
    d.web.forEach((w,i)=>{ if(i<4){
      const html=w.replace(d.char,`<em>${d.char}</em>`);
      slots[pos[i]]=`<div class="w say ${pos[i]} reveal" data-say="${w}" style="--d:${2.0+i*0.45}s">${html}</div>`;
    }});
    return `<div class="web">
      ${slots.top}${slots.left}
      <div class="center say reveal" data-say="${d.char}" style="--d:1.6s">${d.char}</div>
      ${slots.right}${slots.bottom}</div>`;
  })();

  const vocab = d.vocab.map((v,i)=>`
    <div class="vrow reveal" style="--d:${(3.6+i*0.42).toFixed(2)}s">
      <span class="vw say" data-say="${v.w}">${v.w}</span><span class="vp">${v.p}</span><span class="ve">${v.e}</span>
    </div>`).join('');
  const vEnd = 3.6 + d.vocab.length*0.42;

  return `
  <div class="write-col">
    <div class="reading reveal${maskReadings?' masked':''}" id="reading" style="--d:.2s">
      ${py}
      <div class="peek">點我看讀音</div>
    </div>
    <div class="gridbox">
      <div class="diag"><span></span><span></span></div>
      <div id="hzwTarget"></div>
      <div class="hand" id="hand" aria-hidden="true">
        <svg viewBox="0 0 150 150">
          <ellipse cx="96" cy="122" rx="40" ry="9" fill="rgba(0,0,0,.12)"/>
          <line x1="18" y1="18" x2="88" y2="88" stroke="#d44637" stroke-width="21" stroke-linecap="round"/>
          <line x1="50" y1="50" x2="58" y2="58" stroke="#fff" stroke-width="21" opacity=".55"/>
          <path d="M18 18 L7 7 L27 18 L18 28 Z" fill="#25303b"/>
          <circle cx="8" cy="8" r="3.2" fill="#25303b"/>
          <path d="M72 80 q28 -6 46 16 q12 16 3 34 q-9 16 -31 13 q-26 -3 -35 -23 q-7 -18 17 -54 z" fill="#f4cda0" stroke="#e0a877" stroke-width="2"/>
          <path d="M88 98 q13 6 17 20 M98 94 q11 8 13 22 M106 94 q7 10 7 22" fill="none" stroke="#e0a877" stroke-width="2" opacity=".7"/>
        </svg>
      </div>
    </div>
    <div class="meta reveal" style="--d:1.0s">
      <span class="pill">部首 <b>${d.radical}</b></span>
      <span class="pill">筆畫 <b>${d.strokes}</b></span>
    </div>
  </div>

  <div class="content-col">
    <div class="panel reveal" style="--d:1.4s">
      <h3>語詞搭配 <span class="tag">word web</span></h3>
      ${web}
    </div>
    <div class="panel reveal" style="--d:3.3s">
      <h3>常用詞語 <span class="tag">vocabulary</span></h3>
      <div class="vocab">${vocab}</div>
    </div>
    <div class="cards">
      <div class="card sim reveal" style="--d:${(vEnd+0.3).toFixed(2)}s">
        <div class="ct">相似字辨析</div>
        <div class="cc">${d.similar.pair}</div>
        <div class="cd">${d.similar.note}</div>
      </div>
      <div class="card hom reveal" style="--d:${(vEnd+0.7).toFixed(2)}s">
        <div class="ct">同音／形近字</div>
        <div class="cc">${d.homophone.pair}</div>
        <div class="cd">${d.homophone.note}</div>
      </div>
    </div>
    <div class="idiom reveal" style="--d:${(vEnd+1.3).toFixed(2)}s">
      <div class="ci say" data-say="${d.idiom.text}">${d.idiom.text}</div>
      <div class="cm">${d.idiom.meaning}</div>
    </div>
  </div>`;
}

/* ---------- pen-following stroke animation ---------- */
function buildHandMapper(){
  const box=document.querySelector('.gridbox'); if(!box) return null;
  const cv=document.querySelector('#hzwTarget canvas')||document.querySelector('#hzwTarget svg');
  if(!cv) return null;
  let t; try{ t=HanziWriter.getScalingTransform(writerRES,writerRES,writerPad); }
  catch(e){ const s=(writerRES-2*writerPad)/1024; t={x:writerPad,y:writerPad,scale:s}; }
  const cRect=cv.getBoundingClientRect(), gRect=box.getBoundingClientRect();
  const sx=cRect.width/writerRES, sy=cRect.height/writerRES;
  MAP_SCALE = Math.abs(t.scale)*sx || 0.2;
  const offX=cRect.left-gRect.left, offY=cRect.top-gRect.top;
  return (rx,ry)=>{
    const cx = t.x + t.scale*rx;
    const cy = (writerRES - t.y) - t.scale*ry;   // mirrors HZW transform translate(x,H-y) scale(s,-s)
    return { x: offX + cx*sx, y: offY + cy*sy };
  };
}
function medianInfo(med){
  let total=0; const segs=[0];
  for(let i=1;i<med.length;i++){ total+=Math.hypot(med[i][0]-med[i-1][0],med[i][1]-med[i-1][1]); segs.push(total); }
  return {segs,total};
}
function pointAt(med,segs,total,t){
  if(med.length<2) return med[0];
  const target=t*total;
  for(let i=1;i<segs.length;i++){
    if(segs[i]>=target){ const f=(target-segs[i-1])/((segs[i]-segs[i-1])||1);
      return [med[i-1][0]+(med[i][0]-med[i-1][0])*f, med[i-1][1]+(med[i][1]-med[i-1][1])*f]; }
  }
  return med[med.length-1];
}
function placeHand(raw){
  const h=document.getElementById('hand'); if(!h||!handMap) return;
  const p=handMap(raw[0],raw[1]); if(!p) return;
  const tip=(h.offsetWidth||90)*0.06;
  h.style.left=(p.x-tip)+'px'; h.style.top=(p.y-tip)+'px';
}
function showHand(){ const h=document.getElementById('hand'); if(h)h.classList.add('show'); }
function hideHand(){ const h=document.getElementById('hand'); if(h)h.classList.remove('show'); }
function stopWritingAnim(){ anim.cancelled=true; if(anim.raf) cancelAnimationFrame(anim.raf); }

function pausableTween(dur,onFrame,my){
  return new Promise(res=>{
    let elapsed=0,last=performance.now();
    function step(now){
      if(my.cancelled){res();return;}
      const dt=now-last; last=now; if(!paused) elapsed+=dt;
      const t=dur<=0?1:Math.min(1,elapsed/dur); onFrame(t);
      if(t>=1){res();return;}
      my.raf=requestAnimationFrame(step);
    }
    my.raf=requestAnimationFrame(step);
  });
}
function pausableDelay(ms,my){
  return new Promise(res=>{
    let elapsed=0,last=performance.now();
    function step(now){ if(my.cancelled){res();return;} const dt=now-last; last=now; if(!paused) elapsed+=dt;
      if(elapsed>=ms){res();return;} my.raf=requestAnimationFrame(step); }
    my.raf=requestAnimationFrame(step);
  });
}

async function runWriting(d){
  stopQuiz();
  stopWritingAnim();
  const my={cancelled:false,raf:0}; anim=my;

  const target=document.getElementById('hzwTarget'); if(!target) return;
  target.innerHTML='';
  const box=document.querySelector('.gridbox');
  const cssSize=Math.max(180, Math.round(box?box.clientWidth:260));
  writerRES=cssSize; writerPad=Math.round(cssSize*0.06);
  writer = HanziWriter.create(target,d.char,{
    renderer:'canvas',
    width:writerRES,height:writerRES,padding:writerPad,
    charDataLoader:(c)=>CHARDATA[c],
    strokeColor:'#25303b', radicalColor:'#d44637',
    showOutline:true, outlineColor:'#c9d0d6',
    showCharacter:false, strokeAnimationSpeed:SPEED
  });
  // wait for Hanzi Writer to actually load data + mount the canvas (not a blind timeout)
  try{ if(writer.getCharacterData) await writer.getCharacterData(); }catch(e){}
  if(my.cancelled) return;
  let cv=null, tries=0;
  while(!cv && !my.cancelled && tries<120){
    cv=target.querySelector('canvas');
    if(cv) break;
    await new Promise(r=>requestAnimationFrame(r)); tries++;
  }
  if(my.cancelled || !cv) return;
  handMap=buildHandMapper();

  const data=CHARDATA[d.char];
  showHand();
  for(let i=0;i<data.strokes.length;i++){
    if(my.cancelled){ return; }
    const med=data.medians[i]; const {segs,total}=medianInfo(med);
    placeHand(pointAt(med,segs,total,0));
    const screenLen=total*MAP_SCALE;
    const dur=Math.max(240, screenLen/(HAND_PXPS*SPEED)*1000);
    let hzwDone=false;
    try{ writer.animateStroke(i,{onComplete:()=>{hzwDone=true;}}); }catch(e){ hzwDone=true; }
    await pausableTween(dur, t=>placeHand(pointAt(med,segs,total,t)), my);
    let guard=0;
    while(!hzwDone && !my.cancelled && guard<400){ await pausableDelay(16,my); guard++; }
    if(my.cancelled) return;
    await pausableDelay(150,my);
  }
  if(!my.cancelled) hideHand();
}

/* ---------- 描寫測驗 (trace quiz) ---------- */
function startQuiz(){
  if(!writer) return;
  stopWritingAnim(); hideHand();
  quizActive=true;
  setAutoAdvance(false); pauseSceneTimer(); setPaused(true);
  const qb=document.getElementById('quizBtn'); qb.textContent='✓ 結束描寫'; qb.classList.add('active');
  const tip=document.getElementById('quizTip'); tip.classList.add('show');
  tip.textContent='用滑鼠或手指,照筆順把「'+LESSON[idx].char+'」描出來!';
  try{ writer.cancelQuiz(); }catch(e){}
  try{ writer.showOutline(); }catch(e){}
  writer.quiz({
    showHintAfterMisses:3, leniency:1.1, highlightOnComplete:true,
    onCorrectStroke:(s)=>{ tip.textContent = s.strokesRemaining>0 ? ('很好!還剩 '+s.strokesRemaining+' 畫') : '快完成了!'; },
    onMistake:(s)=>{ tip.textContent='再試一次,注意筆順喔~'; },
    onComplete:(s)=>{ tip.textContent='✓ 完成!太棒了'+(s.totalMistakes?(' (提示 '+s.totalMistakes+' 次)'):' 一次就成功!'); celebrate(); quizActive=false; qb.textContent='✍ 換我描寫'; qb.classList.remove('active'); }
  });
}
function stopQuiz(){
  try{ if(writer&&writer.cancelQuiz) writer.cancelQuiz(); }catch(e){}
  quizActive=false;
  const tip=document.getElementById('quizTip'); if(tip)tip.classList.remove('show');
  const qb=document.getElementById('quizBtn'); if(qb){qb.textContent='✍ 換我描寫'; qb.classList.remove('active');}
}
function celebrate(){ const gb=document.querySelector('.gridbox'); if(!gb)return; gb.classList.remove('celebrate'); void gb.offsetWidth; gb.classList.add('celebrate'); }

/* scene auto-advance timer with pause support */
function startSceneTimer(ms){
  clearTimeout(sceneTimer);
  sceneStartTs=Date.now(); sceneRemain=ms;
  if(!autoAdvance) return;
  sceneTimer=setTimeout(()=>{ if(!autoAdvance) return; if(idx<LESSON.length-1) go(idx+1); else { setPaused(true); } }, ms);
}
function pauseSceneTimer(){
  clearTimeout(sceneTimer);
  if(sceneStartTs) sceneRemain=Math.max(0,sceneRemain-(Date.now()-sceneStartTs));
}
function resumeSceneTimer(){
  if(!autoAdvance) return;
  sceneStartTs=Date.now();
  sceneTimer=setTimeout(()=>{ if(!autoAdvance) return; if(idx<LESSON.length-1) go(idx+1); else setPaused(true); }, sceneRemain);
}

function mountScene(){
  const d=LESSON[idx];
  sceneMs=computeSceneMs(d);
  const secs=(sceneMs/1000)+'s';

  // progress bar: set duration + restart fill, guarded so layout differences never throw
  try{
    const pbar=document.querySelector('.pbar');
    if(pbar && pbar.style) pbar.style.setProperty('--scene',secs);
    const fill=document.getElementById('pbarFill');
    if(fill && fill.style){
      fill.style.setProperty('--scene',secs);
      fill.style.animation='none'; void fill.offsetWidth; fill.style.animation='';
    }
  }catch(e){}

  stage.innerHTML=renderScene(d);
  try{ if(stage.style) stage.style.setProperty('--scene',secs); }catch(e){}

  curNo.textContent=idx+1; markChip();

  runWriting(d);
  setPaused(false);          // playing
  startSceneTimer(sceneMs);
}

function setPaused(p){
  paused=p;
  stage.classList.toggle('paused',p);
  document.getElementById('pbarFill').style.animationPlayState = p?'paused':'running';
  playBtn.innerHTML = p ? '▶ 播放' : '⏸ 暫停';
  if(writer){ try{ p?writer.pauseAnimation():writer.resumeAnimation(); }catch(e){} }
  if(p) pauseSceneTimer(); else resumeSceneTimer();
}

function go(i){
  i=Math.max(0,Math.min(LESSON.length-1,i));
  stopQuiz(); stopWritingAnim(); hideHand();
  idx=i; mountScene();
}

function setAutoAdvance(on){
  autoAdvance=on;
  autoBtn.classList.toggle('on',on);
  autoBtn.textContent='連播 '+(on?'開':'關');
  if(!on) pauseSceneTimer();
}

playBtn.onclick=()=>{
  if(quizActive){ stopQuiz(); runWriting(LESSON[idx]); setPaused(false); return; }
  if(!stage.firstChild){ go(0); return; }
  setPaused(!paused);
};
document.getElementById('prevBtn').onclick=()=>go(idx-1);
document.getElementById('nextBtn').onclick=()=>go(idx+1);
autoBtn.onclick=()=>{
  setAutoAdvance(!autoAdvance);
  if(autoAdvance && !paused){ sceneRemain=Math.max(sceneRemain,1500); resumeSceneTimer(); }
};

/* extra controls */
document.getElementById('quizBtn').onclick=()=>{ if(quizActive){ stopQuiz(); setPaused(false); runWriting(LESSON[idx]); } else { startQuiz(); } };
document.getElementById('replayBtn2').onclick=()=>{ stopQuiz(); setPaused(false); runWriting(LESSON[idx]); };
document.getElementById('speedRange').oninput=(e)=>{ SPEED=parseFloat(e.target.value)||1; };

/* click-to-speak + reveal masked reading */
stage.addEventListener('click',(e)=>{
  const r=e.target.closest('#reading');
  if(r && r.classList.contains('masked')){ r.classList.remove('masked'); return; }
  const s=e.target.closest('.say');
  if(s){ speak(s.dataset.say||s.textContent.trim()); s.classList.remove('pop'); void s.offsetWidth; s.classList.add('pop'); }
});

document.addEventListener('keydown',e=>{
  if(e.code==='Space'){ e.preventDefault();
    if(quizActive){ stopQuiz(); runWriting(LESSON[idx]); setPaused(false); return; }
    if(!stage.firstChild) go(0); else setPaused(!paused); }
  else if(e.code==='ArrowRight') go(idx+1);
  else if(e.code==='ArrowLeft') go(idx-1);
});

/* mount first scene paused-ready (show content, wait for play) */
function init(){
  idx=0; mountScene();          // auto-plays first character
}
let _rzT, _lastW = window.innerWidth;
function _refit(){ clearTimeout(_rzT); _rzT=setTimeout(()=>{ const w=window.innerWidth; if(w===_lastW) return; _lastW=w; if(stage.firstChild) mountScene(); },350); }
window.addEventListener('resize',_refit);
window.addEventListener('orientationchange',()=>{ _lastW=null; _refit(); });
init();
</script>
</body>
